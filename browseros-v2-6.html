<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="BrowserOS - A full desktop operating system in your browser">
<title>BrowserOS</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;BrowserOS&quot;,&quot;short_name&quot;:&quot;BrowserOS&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;#1a1a2e&quot;}">
<style>
/* ============================================================
   BrowserOS - Windows 11 + macOS Tahoe Pixel-Perfect UI
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --win-taskbar-h: 48px;
  --win-accent: #0078d4;
  --win-accent2: #60cdff;
  --mac-menubar-h: 32px;
  --mac-dock-h: 80px;
}

[data-theme="windows"] {
  --tb-h: var(--win-taskbar-h);
  --accent: #0078d4;
  --desktop-bg: #4a90d9;
  --text: #ffffff;
  --border: rgba(255,255,255,0.1);
  --window-bg: rgba(32,32,32,0.97);
  --sidebar: rgba(28,28,28,0.98);
  --item-hover: rgba(255,255,255,0.07);
  --btn-close: #c42b1c;
  --radius: 8px;
  --font: 'Segoe UI Variable','Segoe UI','Inter',system-ui,sans-serif;
  --titlebar-bg: rgba(32,32,32,0.97);
  --taskbar-bg: rgba(32,32,32,0.82);
}
[data-theme="macos"] {
  --tb-h: var(--mac-menubar-h);
  --accent: #007aff;
  --desktop-bg: #1a6eb5;
  --text: #ffffff;
  --border: rgba(255,255,255,0.12);
  --window-bg: rgba(30,30,30,0.93);
  --sidebar: rgba(24,24,26,0.98);
  --item-hover: rgba(255,255,255,0.07);
  --btn-close: #ff5f57;
  --radius: 12px;
  --font: -apple-system,'SF Pro Text','SF Pro Display',BlinkMacSystemFont,'Inter',sans-serif;
  --titlebar-bg: rgba(38,38,38,0.95);
  --taskbar-bg: rgba(28,28,28,0.72);
}
[data-theme="linux"] {
  --tb-h: 38px;
  --accent: #9b59b6;
  --desktop-bg: #1a1b2e;
  --text: #e0e0e0;
  --border: #4a4a6a;
  --window-bg: #242535;
  --sidebar: #1e1f2e;
  --item-hover: rgba(155,89,182,0.15);
  --btn-close: #e74c3c;
  --radius: 6px;
  --font: 'Ubuntu','Noto Sans',system-ui,sans-serif;
  --titlebar-bg: #3c3f48;
  --taskbar-bg: #2b2b3b;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  font-family:var(--font,system-ui,sans-serif);
  background:var(--desktop-bg,#4a90d9);
  color:var(--text,#fff);
  user-select:none;
  -webkit-user-select:none;
  transition:background 0.4s;
}

/* ── WIN11 WALLPAPER ── */
[data-theme="windows"] #desktop {
  background:
    radial-gradient(ellipse 60% 80% at 55% 50%, rgba(0,60,180,0.85) 0%, transparent 55%),
    radial-gradient(ellipse 80% 60% at 20% 60%, #1a90ff 0%, transparent 50%),
    radial-gradient(ellipse 60% 80% at 80% 40%, #003d9e 0%, transparent 50%),
    linear-gradient(180deg,#b8d4f0 0%,#6ab0e8 35%,#1a72d6 65%,#0050b3 100%);
}

/* ── MACOS TAHOE WALLPAPER ── */
[data-theme="macos"] #desktop {
  background:
    radial-gradient(ellipse 120% 40% at 60% 30%, rgba(100,190,230,0.55) 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 28% 18%, rgba(240,210,140,0.5) 0%, transparent 50%),
    radial-gradient(ellipse 100% 50% at 70% 65%, rgba(20,80,180,0.45) 0%, transparent 60%),
    linear-gradient(135deg, #f5e6c8 0%, #e8c88a 15%, #a8c8e8 38%, #5898d8 58%, #2060b8 78%, #1040a0 100%);
}

/* ── LINUX WALLPAPER ── */
[data-theme="linux"] #desktop {
  background: radial-gradient(ellipse at 50% 50%, rgba(155,89,182,0.12) 0%, transparent 60%), #1a1b2e;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(180deg,#0d1a2e 0%,#1a2a4e 50%,#0a1828 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#login-screen.hidden{display:none;}
.login-clock{font-size:72px;font-weight:200;letter-spacing:-3px;color:rgba(255,255,255,0.95);line-height:1;font-family:var(--font);}
.login-date-str{font-size:16px;color:rgba(255,255,255,0.65);letter-spacing:0.3px;margin-top:-6px;margin-bottom:8px;font-family:var(--font);}
.login-logo{font-size:32px;font-weight:700;background:linear-gradient(135deg,#60cdff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.login-sub{color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:3px;text-transform:uppercase;}
.login-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:28px;width:340px;backdrop-filter:blur(40px);display:flex;flex-direction:column;gap:12px;box-shadow:0 24px 64px rgba(0,0,0,0.5);}
.login-tabs{display:flex;gap:6px;}
.login-tab{flex:1;padding:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.45);border-radius:8px;cursor:pointer;font-size:13px;transition:all 0.2s;font-family:var(--font);}
.login-tab.active{background:rgba(96,205,255,0.15);border-color:rgba(96,205,255,0.4);color:#60cdff;}
.login-input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#fff;font-size:13px;outline:none;transition:border-color 0.2s;font-family:var(--font);}
.login-input:focus{border-color:rgba(96,205,255,0.5);background:rgba(255,255,255,0.1);}
.login-input::placeholder{color:rgba(255,255,255,0.3);}
.login-btn{width:100%;padding:10px;background:linear-gradient(135deg,#0078d4,#60cdff);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.2s;font-family:var(--font);}
.login-btn:hover{opacity:0.88;}
.login-users{display:flex;flex-wrap:wrap;gap:6px;}
.login-user-btn{padding:5px 12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;color:rgba(255,255,255,0.65);cursor:pointer;font-size:12px;transition:all 0.2s;font-family:var(--font);}
.login-user-btn:hover{background:rgba(255,255,255,0.14);color:#fff;}
.login-error{color:#ff6b6b;font-size:12px;text-align:center;min-height:16px;}

/* ── DESKTOP ── */
#desktop{position:fixed;inset:0;padding-bottom:48px;overflow:hidden;}
[data-theme="macos"] #desktop{padding-top:var(--mac-menubar-h);padding-bottom:calc(var(--mac-dock-h) + 24px);}
[data-theme="linux"] #desktop{padding-bottom:48px;}
[data-theme="linux"] #desktop{padding-bottom:38px;}

.desktop-icons{display:flex;flex-direction:column;flex-wrap:wrap;align-content:flex-start;gap:8px;padding:16px;height:100%;pointer-events:none;}
.desktop-icon{display:flex;flex-direction:column;align-items:center;gap:4px;width:72px;cursor:pointer;border-radius:8px;padding:6px 4px;pointer-events:all;transition:background 0.15s;}
.desktop-icon:hover{background:rgba(255,255,255,0.13);}
.desktop-icon.selected{background:rgba(0,120,212,0.3);}
.desktop-icon-img{display:flex;align-items:center;justify-content:center;}
.desktop-icon-img img{filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3));transition:filter 0.15s,transform 0.15s;}
.desktop-icon:hover .desktop-icon-img img{filter:drop-shadow(0 5px 14px rgba(0,0,0,0.5));transform:scale(1.06);}
.start-app-icon img{filter:drop-shadow(0 1px 4px rgba(0,0,0,0.25));}
.dock-item img{filter:drop-shadow(0 4px 14px rgba(0,0,0,0.4));transition:filter 0.2s,transform 0.2s;}
.dock-item:hover img{filter:drop-shadow(0 10px 24px rgba(0,0,0,0.55));}
.taskbar-pinned-btn img{filter:drop-shadow(0 1px 3px rgba(0,0,0,0.45));}
.fm-item-icon img{filter:drop-shadow(0 1px 5px rgba(0,0,0,0.25));transition:filter 0.15s;}
.fm-item:hover .fm-item-icon img{filter:drop-shadow(0 3px 10px rgba(0,0,0,0.4));}
.window-title img{flex-shrink:0;vertical-align:middle;margin-right:2px;}
.fluent-icon-wrap img{filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));transition:filter 0.15s;}
.desktop-icon:hover .fluent-icon-wrap img{filter:drop-shadow(0 4px 10px rgba(0,0,0,0.45)) brightness(1.06);}
.dock-item .fluent-icon-wrap img{filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4));}
.dock-item:hover .fluent-icon-wrap img{filter:drop-shadow(0 8px 20px rgba(0,0,0,0.55)) brightness(1.08);}
.taskbar-pinned-btn .fluent-icon-wrap img{filter:brightness(0) invert(1);}
.taskbar-pinned-btn.active .fluent-icon-wrap img,.taskbar-pinned-btn:hover .fluent-icon-wrap img{filter:none;}
.start-app-icon{display:flex;align-items:center;justify-content:center;}
.taskbar-app-btn-icon{display:flex;align-items:center;justify-content:center;}
.fm-item-icon{display:flex;align-items:center;justify-content:center;}
.fm-item:hover .fluent-icon-wrap img{filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4)) brightness(1.05);}
.window-title .fluent-icon-wrap{flex-shrink:0;}
.fluent-fallback{border-radius:8px;}
.desktop-icon-label{font-size:11px;text-align:center;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.9);word-break:break-word;max-width:68px;line-height:1.3;}

/* ── WIN11 TASKBAR ── */
/* ── WIN11 TASKBAR ──────────────────────────────────────────── */
#taskbar{
  position:fixed;bottom:0;left:0;right:0;
  height:48px;
  background:rgba(18,18,18,0.92);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;
  z-index:1000;
}
[data-theme="macos"] #taskbar{display:none!important;}
[data-theme="linux"] #taskbar{background:rgba(28,28,44,0.97);justify-content:flex-start;padding:0 8px;gap:4px;}

/* Start button */
#start-btn{
  width:48px;height:48px;border:none;cursor:pointer;
  background:transparent;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background 0.15s;
}
#start-btn:hover{background:rgba(255,255,255,0.09);}
[data-theme="linux"] #start-btn{
  background:var(--accent);border-radius:4px;
  height:32px;width:auto;padding:0 12px;color:#fff;font-size:15px;
}
[data-theme="linux"] #start-btn:hover{filter:brightness(1.15);}

/* LEFT zone — only shows start btn */
#taskbar-left{display:none;align-items:center;height:100%;}
[data-theme="windows"] #taskbar-left{display:flex;}
[data-theme="linux"]   #taskbar-left{display:flex;}
[data-theme="macos"]   #taskbar-left{display:none!important;}

/* CENTER zone — pinned apps, centered absolutely */
#taskbar-center{
  display:none;
  position:absolute;left:50%;transform:translateX(-50%);
  align-items:center;gap:2px;height:100%;
}
[data-theme="windows"] #taskbar-center{display:flex;}
[data-theme="macos"]   #taskbar-center{display:none!important;}

/* RIGHT zone — tray + clock, pinned to right edge */
#taskbar-right{
  display:none;
  position:absolute;right:0;height:100%;
  align-items:center;
}
[data-theme="windows"] #taskbar-right{display:flex;}
[data-theme="macos"]   #taskbar-right{display:none!important;}

/* Search pill */
#win11-search{
  display:flex;align-items:center;gap:7px;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:8px;padding:0 14px;height:34px;width:220px;
  cursor:pointer;transition:background 0.15s;
  color:rgba(255,255,255,0.42);font-size:12px;font-family:var(--font);
  margin-right:4px;
}
#win11-search:hover{background:rgba(255,255,255,0.12);}

/* Pinned app buttons */
#taskbar-pinned{display:flex;align-items:center;gap:1px;height:100%;}
.taskbar-pinned-btn{
  width:44px;height:44px;border:none;
  background:transparent;border-radius:5px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:background 0.12s;
  flex-direction:column;
}
.taskbar-pinned-btn:hover{background:rgba(255,255,255,0.09);}
.taskbar-pinned-btn:active{background:rgba(255,255,255,0.05);}
.taskbar-pinned-btn.running::after{
  content:'';position:absolute;bottom:3px;left:50%;
  transform:translateX(-50%);
  width:12px;height:3px;border-radius:2px;background:#60cdff;
  transition:width 0.15s;
}
.taskbar-pinned-btn.active{background:rgba(255,255,255,0.11);}
.taskbar-pinned-btn.active::after{width:20px;}

/* System tray */
#win11-tray{display:flex;align-items:center;height:100%;}
.tray-btn{
  display:flex;align-items:center;justify-content:center;
  height:100%;padding:0 7px;cursor:pointer;border-radius:4px;
  transition:background 0.15s;opacity:0.82;
}
.tray-btn:hover{background:rgba(255,255,255,0.09);opacity:1;}
#tray-overflow{
  padding:0 5px;height:100%;display:flex;align-items:center;
  font-size:10px;color:rgba(255,255,255,0.6);cursor:pointer;border-radius:4px;
}
#tray-overflow:hover{background:rgba(255,255,255,0.09);}
#win11-clock{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 12px;height:100%;cursor:pointer;border-radius:4px;
  font-size:11px;line-height:1.5;color:rgba(255,255,255,0.9);
  white-space:nowrap;transition:background 0.15s;
}
#win11-clock:hover{background:rgba(255,255,255,0.09);}

/* Linux taskbar */
.taskbar-apps{display:flex;gap:2px;flex:1;overflow:hidden;}
[data-theme="windows"] .taskbar-apps{display:none;}
[data-theme="macos"]   .taskbar-apps{display:none;}
.taskbar-app-btn{
  display:flex;align-items:center;gap:6px;padding:4px 10px;
  border-radius:4px;background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);color:var(--text);
  cursor:pointer;font-size:12px;transition:background 0.15s;
  white-space:nowrap;max-width:150px;overflow:hidden;font-family:var(--font);
}
.taskbar-app-btn.active{background:rgba(255,255,255,0.18);border-color:var(--accent);}
.taskbar-app-btn:hover{background:rgba(255,255,255,0.15);}
.taskbar-app-btn-icon{flex-shrink:0;}
.taskbar-app-btn-label{overflow:hidden;text-overflow:ellipsis;}
.taskbar-clock{display:none;margin-left:auto;font-size:12px;color:var(--text);opacity:0.8;flex-shrink:0;padding:0 8px;flex-direction:column;align-items:flex-end;line-height:1.4;}
[data-theme="linux"] .taskbar-clock{display:flex;}
/* Linux taskbar apps */
.taskbar-apps{display:flex;gap:2px;flex:1;overflow:hidden;}
[data-theme="windows"] .taskbar-apps{display:none;}
[data-theme="macos"] .taskbar-apps{display:none;}
.taskbar-app-btn{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius,4px);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:var(--text);cursor:pointer;font-size:12px;transition:background 0.15s;white-space:nowrap;max-width:160px;overflow:hidden;font-family:var(--font);}
.taskbar-app-btn.active{background:rgba(255,255,255,0.18);border-color:var(--accent);}
.taskbar-app-btn:hover{background:rgba(255,255,255,0.15);}
.taskbar-app-btn-icon{font-size:14px;flex-shrink:0;}
.taskbar-app-btn-label{overflow:hidden;text-overflow:ellipsis;}
.taskbar-clock{display:none;margin-left:auto;font-size:12px;color:var(--text);opacity:0.8;flex-shrink:0;padding:0 8px;flex-direction:column;align-items:flex-end;line-height:1.4;}
[data-theme="linux"] .taskbar-clock{display:flex;}

/* Linux taskbar apps */
.taskbar-apps{display:flex;gap:2px;flex:1;overflow:hidden;}
[data-theme="windows"] .taskbar-apps{display:none;}
[data-theme="macos"] .taskbar-apps{display:none;}
.taskbar-app-btn{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius,4px);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:var(--text);cursor:pointer;font-size:12px;transition:background 0.15s;white-space:nowrap;max-width:160px;overflow:hidden;font-family:var(--font);}
.taskbar-app-btn.active{background:rgba(255,255,255,0.18);border-color:var(--accent);}
.taskbar-app-btn:hover{background:rgba(255,255,255,0.15);}
.taskbar-app-btn-icon{font-size:14px;flex-shrink:0;}
.taskbar-app-btn-label{overflow:hidden;text-overflow:ellipsis;}
.taskbar-clock{display:none;margin-left:auto;font-size:12px;color:var(--text);opacity:0.8;flex-shrink:0;padding:0 8px;flex-direction:column;align-items:flex-end;line-height:1.4;}
[data-theme="linux"] .taskbar-clock{display:flex;}

/* ── MACOS MENU BAR ── */
/* ── MACOS MENUBAR ──────────────────────────────────────────── */
#mac-menubar{
  display:none;position:fixed;top:0;left:0;right:0;
  height:32px;z-index:9999;
  background:rgba(24,24,24,0.95);
  border-bottom:1px solid rgba(255,255,255,0.1);
  align-items:center;padding:0;font-size:13px;
  font-family:var(--font);
}
[data-theme="macos"] #mac-menubar{display:flex!important;}
.mac-menu-apple{
  padding:0 14px;height:100%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.12s;
  min-width:40px;
}
.mac-menu-apple:hover{background:rgba(255,255,255,0.12);}
.mac-menu-appname{
  font-weight:600;font-size:13px;font-family:var(--font);
  padding:0 10px;height:100%;display:flex;align-items:center;
}
.mac-menu-item{
  padding:0 9px;height:100%;display:flex;align-items:center;
  cursor:pointer;opacity:0.8;font-size:13px;
  transition:background 0.12s;font-family:var(--font);
}
.mac-menu-item:hover{opacity:1;background:rgba(255,255,255,0.13);}
.mac-menubar-right{
  margin-left:auto;display:flex;align-items:center;
  height:100%;font-family:var(--font);
}
.mac-tray-item{
  padding:0 8px;height:100%;display:flex;align-items:center;
  cursor:pointer;opacity:0.85;transition:background 0.12s;
}
.mac-tray-item:hover{background:rgba(255,255,255,0.13);opacity:1;}

#mac-dock{display:none;}
[data-theme="macos"] #mac-dock{
  display:flex;align-items:flex-end;
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.14);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:20px;padding:8px 12px;
  z-index:1000;gap:6px;
  box-shadow:0 8px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.25);
}
.dock-item{
  width:54px;height:54px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;flex-shrink:0;
  transition:transform 0.18s cubic-bezier(.34,1.56,.64,1);
}
.dock-item img{border-radius:22%;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.dock-item:hover{transform:scale(1.45) translateY(-14px);}
.dock-item:active{transform:scale(0.92);}
.dock-item.running::after{
  content:'';position:absolute;bottom:-6px;left:50%;
  transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:rgba(255,255,255,0.9);
}
.dock-item::before{
  content:attr(data-label);
  position:absolute;bottom:calc(100% + 12px);left:50%;
  transform:translateX(-50%);opacity:0;
  background:rgba(24,24,24,0.88);color:#fff;
  padding:4px 10px;border-radius:7px;font-size:12px;font-weight:500;
  white-space:nowrap;pointer-events:none;
  transition:opacity 0.12s;font-family:var(--font);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.dock-item:hover::before{opacity:1;}
@keyframes dockBounce{0%{transform:translateY(0)}25%{transform:translateY(-18px)}50%{transform:translateY(-6px)}75%{transform:translateY(-12px)}100%{transform:translateY(0)}}
.dock-item.bouncing{animation:dockBounce 0.65s ease;}
.dock-separator{width:1px;background:rgba(255,255,255,0.25);margin:4px 2px;align-self:stretch;}
@keyframes dockBounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-20px)}60%{transform:translateY(-8px)}80%{transform:translateY(-14px)}}
.dock-item.bouncing{animation:dockBounce 0.7s ease;}

/* ── WIN11 START MENU ── */
#start-menu{
  position:fixed;bottom:calc(var(--win-taskbar-h) + 8px);
  left:50%;transform:translateX(-50%);
  width:640px;
  background:rgba(32,32,32,0.97);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;z-index:5000;
  overflow:hidden;display:none;
  backdrop-filter:blur(60px) saturate(180%);
  box-shadow:0 16px 60px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.05);
}
#start-menu.visible{display:block;animation:startIn 0.18s cubic-bezier(.34,1.2,.64,1);}
@keyframes startIn{from{opacity:0;transform:translateX(-50%) translateY(10px) scale(0.97);}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}}
[data-theme="macos"] #start-menu{display:none!important;}
[data-theme="linux"] #start-menu{left:8px;transform:none;width:300px;bottom:calc(38px + 4px);}
.start-search{padding:20px 24px 10px;}
.start-search input{width:100%;padding:9px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:4px;color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color 0.2s;}
.start-search input:focus{border-color:rgba(0,120,212,0.7);}
.start-section-title{font-size:12px;font-weight:600;padding:8px 24px 4px;color:rgba(255,255,255,0.6);letter-spacing:0.2px;font-family:var(--font);}
.start-apps{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;padding:4px 16px 12px;}
.start-app{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border-radius:6px;cursor:pointer;transition:background 0.15s;font-size:11px;text-align:center;font-family:var(--font);}
.start-app:hover{background:rgba(255,255,255,0.08);}
.start-app-icon{font-size:28px;}
.start-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-top:1px solid rgba(255,255,255,0.07);}
.start-user-row{display:flex;align-items:center;gap:10px;}
.start-user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0078d4,#60cdff);display:flex;align-items:center;justify-content:center;font-size:16px;}
.start-footer-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:14px;opacity:0.6;transition:all 0.15s;padding:6px;border-radius:4px;}
.start-footer-btn:hover{opacity:1;background:rgba(255,255,255,0.08);}

/* ── WINDOWS ── */
.window{
  position:absolute;
  background:var(--window-bg,rgba(32,32,32,0.97));
  border:1px solid var(--border);
  border-radius:var(--radius,8px);
  box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04);
  display:flex;flex-direction:column;
  min-width:300px;min-height:200px;
  overflow:hidden;z-index:100;
  backdrop-filter:blur(40px);
  transition:box-shadow 0.2s;
}
.window.active{box-shadow:0 16px 60px rgba(0,0,0,0.75),0 0 0 1px rgba(255,255,255,0.08);}
[data-theme="windows"] .window{border-radius:8px;}
[data-theme="macos"] .window{border-radius:12px;}
.window.minimized{display:none!important;}
.window.maximized{left:0!important;right:0!important;width:100%!important;border-radius:0!important;}
[data-theme="windows"] .window.maximized{top:0!important;height:calc(100vh - var(--win-taskbar-h))!important;}
[data-theme="macos"] .window.maximized{top:var(--mac-menubar-h)!important;height:calc(100vh - var(--mac-menubar-h) - var(--mac-dock-h) - 20px)!important;}
[data-theme="linux"] .window.maximized{top:0!important;height:calc(100vh - 38px)!important;}

.window-titlebar{display:flex;align-items:center;background:var(--titlebar-bg);padding:0 0 0 12px;height:32px;flex-shrink:0;cursor:grab;gap:8px;border-bottom:1px solid rgba(255,255,255,0.06);}
[data-theme="macos"] .window-titlebar{height:28px;padding:0 12px;}
.window-titlebar:active{cursor:grabbing;}
.window-title{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.85;font-family:var(--font);}
[data-theme="macos"] .window-title{text-align:center;font-size:13px;}
.window-controls{display:flex;gap:6px;align-items:center;height:100%;}
[data-theme="windows"] .window-controls,[data-theme="linux"] .window-controls{margin-left:auto;}
[data-theme="macos"] .window-controls{padding:0 8px;gap:7px;}
[data-theme="macos"] .window-title{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;font-weight:500;}

/* Win11 controls - right-aligned slim rectangles */
[data-theme="windows"] .window-controls{margin-left:auto;gap:0;}
[data-theme="windows"] .wc-btn{width:46px;height:32px;border-radius:0;background:transparent;border:none;color:rgba(255,255,255,0.8);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
[data-theme="windows"] .wc-btn:hover{background:rgba(255,255,255,0.1);}
[data-theme="windows"] .wc-btn.close:hover{background:#c42b1c;color:#fff;}

/* macOS traffic lights */
[data-theme="macos"] .wc-btn{width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;font-size:0;transition:filter 0.15s;}
[data-theme="macos"] .wc-btn.close{background:#ff5f57;}
[data-theme="macos"] .wc-btn.minimize{background:#febc2e;}
[data-theme="macos"] .wc-btn.maximize{background:#28c840;}
[data-theme="macos"] .window-controls:hover .wc-btn{font-size:8px;}

/* Linux */
[data-theme="linux"] .wc-btn{width:14px;height:14px;border-radius:50%;border:none;cursor:pointer;font-size:0;}
[data-theme="linux"] .wc-btn.close{background:#e74c3c;}
[data-theme="linux"] .wc-btn.minimize{background:#f39c12;}
[data-theme="linux"] .wc-btn.maximize{background:#27ae60;}

.window-body{flex:1;overflow:hidden;display:flex;flex-direction:column;background:var(--window-bg);}
.window-resize{position:absolute;bottom:0;right:0;width:16px;height:16px;cursor:se-resize;z-index:10;}
.window-resize::after{content:'';position:absolute;bottom:3px;right:3px;width:8px;height:8px;border-right:2px solid rgba(255,255,255,0.2);border-bottom:2px solid rgba(255,255,255,0.2);}

/* ── FILE MANAGER ── */
.fm-container{display:flex;height:100%;overflow:hidden;}
.fm-sidebar{width:160px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;flex-shrink:0;}
.fm-sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:12px;transition:background 0.15s;border-radius:4px;margin:1px 6px;font-family:var(--font);}
.fm-sidebar-item:hover{background:var(--item-hover);}
.fm-sidebar-item.active{background:rgba(0,120,212,0.2);color:var(--accent);}
.fm-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.fm-toolbar{display:flex;align-items:center;gap:6px;padding:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.fm-btn{background:var(--item-hover);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:var(--radius);cursor:pointer;font-size:12px;transition:all 0.15s;font-family:var(--font);}
.fm-btn:hover{background:rgba(255,255,255,0.12);}
.fm-path{flex:1;padding:5px 10px;background:rgba(0,0,0,0.2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;outline:none;font-family:var(--font);}
.fm-content{flex:1;display:flex;flex-wrap:wrap;gap:4px;padding:12px;overflow-y:auto;align-content:flex-start;}
.fm-item{display:flex;flex-direction:column;align-items:center;gap:4px;width:80px;padding:8px 4px;border-radius:var(--radius);cursor:pointer;border:1px solid transparent;transition:all 0.15s;font-size:11px;color:var(--text);text-align:center;font-family:var(--font);}
.fm-item:hover{background:var(--item-hover);border-color:var(--border);}
.fm-item.selected{background:rgba(0,120,212,0.2);border-color:rgba(0,120,212,0.4);}
.fm-item-icon{font-size:28px;display:flex;align-items:center;justify-content:center;}
.fm-item-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center;}
.fm-status{padding:4px 12px;border-top:1px solid var(--border);font-size:11px;opacity:0.5;flex-shrink:0;font-family:var(--font);}

/* ── MUSIC ── */
.music-container{display:flex;flex-direction:column;height:100%;background:var(--window-bg);}
.music-visualizer{height:60px;display:flex;align-items:flex-end;gap:2px;padding:0 16px;background:rgba(0,0,0,0.2);flex-shrink:0;}
.vis-bar{flex:1;border-radius:2px 2px 0 0;min-height:4px;background:linear-gradient(to top,var(--accent),rgba(255,255,255,0.3));transition:height 0.12s ease;}
.music-now-playing{display:flex;align-items:center;gap:14px;padding:14px 16px;flex-shrink:0;}
.music-art{width:52px;height:52px;border-radius:8px;background:linear-gradient(135deg,var(--accent),rgba(255,255,255,0.2));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.music-title{font-size:14px;font-weight:600;font-family:var(--font);}
.music-artist{font-size:12px;opacity:0.55;margin-top:2px;font-family:var(--font);}
.music-info{flex:1;overflow:hidden;}
.music-progress-wrap{padding:0 16px;flex-shrink:0;}
.music-progress{width:100%;height:4px;appearance:none;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;accent-color:var(--accent);}
.music-times{display:flex;justify-content:space-between;font-size:11px;opacity:0.45;margin-top:4px;font-family:var(--font);}
.music-controls{display:flex;justify-content:center;align-items:center;gap:8px;padding:12px 16px;flex-shrink:0;}
.music-btn{background:none;border:none;color:var(--text);font-size:18px;cursor:pointer;opacity:0.65;transition:opacity 0.15s;padding:6px;border-radius:50%;}
.music-btn:hover{opacity:1;background:var(--item-hover);}
.music-btn.play-pause{width:48px;height:48px;border-radius:50%;background:var(--accent);opacity:1;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.music-volume{display:flex;align-items:center;gap:8px;padding:0 16px 12px;}
.music-vol-slider{flex:1;height:4px;appearance:none;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;accent-color:var(--accent);}
.music-playlist{flex:1;overflow-y:auto;border-top:1px solid var(--border);}
.music-track{display:flex;align-items:center;gap:10px;padding:8px 16px;cursor:pointer;transition:background 0.15s;font-size:12px;font-family:var(--font);}
.music-track:hover{background:var(--item-hover);}
.music-track.playing{background:rgba(0,120,212,0.15);color:var(--accent);}
.music-track-num{width:20px;opacity:0.4;text-align:center;font-size:11px;}
.music-track-info{flex:1;overflow:hidden;}
.music-track-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.music-track-dur{opacity:0.5;font-size:11px;flex-shrink:0;}
.music-upload-btn{margin:12px 16px;padding:10px;background:rgba(255,255,255,0.04);border:1px dashed var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:12px;opacity:0.6;transition:all 0.2s;font-family:var(--font);}
.music-upload-btn:hover{opacity:1;border-color:var(--accent);}

/* ── BROWSER ── */
.browser-container{display:flex;flex-direction:column;height:100%;}
.browser-tabs{display:flex;gap:2px;padding:4px 8px 0;background:var(--sidebar);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;}
.browser-tab{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,255,255,0.05);border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;white-space:nowrap;min-width:80px;max-width:160px;transition:background 0.15s;position:relative;flex-shrink:0;font-family:var(--font);}
.browser-tab.active{background:var(--window-bg);}
.browser-tab-title{overflow:hidden;text-overflow:ellipsis;flex:1;}
.browser-tab-close{opacity:0;background:none;border:none;color:var(--text);font-size:14px;cursor:pointer;padding:0 2px;border-radius:3px;line-height:1;flex-shrink:0;}
.browser-tab:hover .browser-tab-close{opacity:0.6;}
.browser-tab-close:hover{opacity:1!important;background:rgba(255,255,255,0.15);}
.browser-new-tab{padding:6px 10px;background:none;border:none;color:var(--text);cursor:pointer;opacity:0.5;font-size:16px;border-radius:4px;flex-shrink:0;transition:opacity 0.15s;}
.browser-new-tab:hover{opacity:1;}
.browser-bar{display:flex;align-items:center;gap:6px;padding:8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.browser-nav-btn{background:none;border:none;color:var(--text);cursor:pointer;font-size:16px;opacity:0.6;transition:opacity 0.15s;padding:4px 6px;border-radius:4px;}
.browser-nav-btn:hover{opacity:1;background:var(--item-hover);}
.browser-url{flex:1;padding:6px 12px;background:rgba(0,0,0,0.25);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:13px;outline:none;font-family:var(--font);}
.browser-url:focus{border-color:var(--accent);}
.browser-content{flex:1;overflow:hidden;position:relative;}
.browser-frame{width:100%;height:100%;border:none;background:#fff;display:none;}
.browser-frame.active{display:block;}
.browser-newtab{height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:24px;background:linear-gradient(135deg,#0d0d1a 0%,#1a1a2e 100%);}
.browser-newtab.active{display:flex;}
.browser-newtab h2{font-size:20px;opacity:0.6;font-family:var(--font);}
.browser-quicklinks{display:grid;grid-template-columns:repeat(4,80px);gap:12px;}
.browser-ql{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;background:rgba(255,255,255,0.05);border-radius:10px;cursor:pointer;font-size:11px;border:1px solid var(--border);transition:background 0.15s;font-family:var(--font);}
.browser-ql:hover{background:rgba(255,255,255,0.1);}
.browser-ql-icon{font-size:24px;}

/* ── TEXT EDITOR ── */
.editor-container{display:flex;flex-direction:column;height:100%;}
.editor-toolbar{display:flex;align-items:center;gap:4px;padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.editor-btn{background:none;border:1px solid transparent;color:var(--text);padding:3px 8px;border-radius:3px;cursor:pointer;font-size:12px;transition:all 0.15s;font-family:var(--font);}
.editor-btn:hover{background:var(--item-hover);border-color:var(--border);}
.editor-filename{margin-left:auto;font-size:12px;opacity:0.5;padding:0 8px;font-family:var(--font);}
.editor-area{flex:1;background:rgba(0,0,0,0.2);color:var(--text);border:none;padding:16px;font-family:'Cascadia Code','Fira Code','Courier New',monospace;font-size:13px;line-height:1.6;resize:none;outline:none;overflow-y:auto;}

/* ── TERMINAL ── */
.terminal-container{display:flex;flex-direction:column;height:100%;background:#0d0d0d;}
.terminal-output{flex:1;overflow-y:auto;padding:12px;font-family:'Cascadia Code','Fira Code','Courier New',monospace;font-size:13px;line-height:1.6;color:#e0e0e0;}
.terminal-line{margin-bottom:2px;word-break:break-all;}
.terminal-line.cmd{color:#60cdff;}
.terminal-line.error{color:#ff6b6b;}
.terminal-line.success{color:#6ccb5f;}
.terminal-input-line{display:flex;align-items:center;gap:8px;padding:8px 12px;border-top:1px solid #222;background:#0d0d0d;flex-shrink:0;}
.terminal-prompt{color:#60cdff;font-family:'Cascadia Code',monospace;font-size:13px;flex-shrink:0;}
.terminal-input{flex:1;background:none;border:none;color:#e0e0e0;font-family:'Cascadia Code',monospace;font-size:13px;outline:none;}

/* ── SETTINGS ── */
.settings-container{display:flex;height:100%;overflow:hidden;}
.settings-sidebar{width:200px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;}
.settings-nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;transition:background 0.15s;border-radius:4px;margin:1px 6px;font-family:var(--font);}
.settings-nav-item:hover,.settings-nav-item.active{background:var(--item-hover);}
.settings-nav-item.active{background:rgba(0,120,212,0.2);color:var(--accent);}
.settings-main{flex:1;overflow-y:auto;padding:24px;}
.settings-section{display:none;}
.settings-section.active{display:block;}
.settings-title{font-size:20px;font-weight:600;margin-bottom:20px;font-family:var(--font);}
.settings-group{margin-bottom:24px;}
.settings-group-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:0.5;margin-bottom:12px;font-family:var(--font);}
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:8px;border:1px solid var(--border);}
.settings-item-label{font-size:13px;font-family:var(--font);}
.settings-item-sub{font-size:11px;opacity:0.5;margin-top:2px;font-family:var(--font);}
.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
.theme-card{padding:16px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all 0.2s;text-align:center;font-size:12px;font-weight:500;font-family:var(--font);}
.theme-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.theme-card.active{border-color:var(--accent);}
.theme-card.win{background:linear-gradient(135deg,#1e3a5f,#0078d4);color:#fff;}
.theme-card.mac{background:linear-gradient(135deg,#2d2d2d,#007aff);color:#fff;}
.theme-card.lin{background:linear-gradient(135deg,#3c3f48,#9b59b6);color:#fff;}
.theme-preview{font-size:28px;margin-bottom:8px;}
.toggle{width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,0.15);position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.toggle.on::after{transform:translateX(18px);}

/* ── ABOUT ── */
.about-container{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:24px;text-align:center;}
.about-logo{font-size:64px;margin-bottom:8px;}
.about-name{font-size:28px;font-weight:700;font-family:var(--font);}
.about-version{opacity:0.5;font-size:13px;font-family:var(--font);}
.about-desc{max-width:320px;opacity:0.7;font-size:13px;line-height:1.6;font-family:var(--font);}
.about-links{display:flex;gap:12px;margin-top:8px;}
.about-link{padding:8px 16px;background:var(--accent);border-radius:8px;color:#fff;text-decoration:none;font-size:13px;cursor:pointer;font-family:var(--font);}
.about-badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.about-badge{padding:4px 10px;background:rgba(255,255,255,0.08);border-radius:20px;font-size:11px;border:1px solid var(--border);font-family:var(--font);}

/* ── IMAGE VIEWER ── */
.img-viewer{display:flex;flex-direction:column;height:100%;align-items:center;}
.img-viewer-toolbar{display:flex;align-items:center;gap:8px;padding:8px;border-bottom:1px solid var(--border);width:100%;}
.img-viewer-canvas{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:16px;}
.img-viewer-canvas img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;}

/* ── CONTEXT MENU ── */
.context-menu{position:fixed;background:rgba(36,36,36,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:4px;z-index:9999;display:none;min-width:180px;box-shadow:0 8px 32px rgba(0,0,0,0.6);backdrop-filter:blur(40px);font-family:var(--font);}
.context-menu.visible{display:block;}
.ctx-item{padding:8px 14px;border-radius:4px;font-size:12px;cursor:pointer;transition:background 0.1s;display:flex;align-items:center;gap:8px;}
.ctx-item:hover{background:rgba(0,120,212,0.25);}
.ctx-sep{height:1px;background:rgba(255,255,255,0.08);margin:3px 8px;}

/* ── NOTIFICATIONS ── */
#notification-center{position:fixed;top:48px;right:12px;width:300px;z-index:8000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
[data-theme="windows"] #notification-center{top:8px;}
[data-theme="linux"] #notification-center{top:46px;}
.notification{background:rgba(40,40,40,0.96);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px 16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);pointer-events:all;animation:notif-in 0.3s ease;backdrop-filter:blur(40px);}
@keyframes notif-in{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.notif-header{display:flex;align-items:center;gap:8px;font-size:12px;opacity:0.6;margin-bottom:4px;font-family:var(--font);}
.notif-body{font-size:13px;font-family:var(--font);}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:7000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.visible{display:flex;}
.modal{background:rgba(40,40,40,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:24px;min-width:280px;max-width:400px;box-shadow:0 16px 60px rgba(0,0,0,0.7);}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;font-family:var(--font);}
.modal-input{width:100%;padding:8px 12px;background:rgba(255,255,255,0.07);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px;font-family:var(--font);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.modal-btn{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;transition:filter 0.15s;font-family:var(--font);}
.modal-btn.primary{background:var(--accent);color:#fff;}
.modal-btn.secondary{background:rgba(255,255,255,0.1);color:var(--text);}
.modal-btn:hover{filter:brightness(1.15);}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.22);}

/* ── UTILS ── */
.hidden{display:none!important;}
.flex-center{display:flex;align-items:center;justify-content:center;}
.empty-state{opacity:0.4;font-size:13px;text-align:center;padding:40px;font-family:var(--font);}
.spinner{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);animation:spin 0.8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading{opacity:0.5;pointer-events:none;}

@media(max-width:600px){
  .window{min-width:280px;}
  .fm-sidebar{width:100px;}
  .settings-sidebar{width:140px;}
  .fm-item{width:60px;}
  .desktop-icon{width:60px;}
  .login-box{width:90vw;}
  .browser-quicklinks{grid-template-columns:repeat(3,70px);}
  #win11-search{display:none!important;}
  #start-menu{width:95vw;left:50%;transform:translateX(-50%);}
}

/* Mac dropdown menus */
.mac-dd-item{
  padding:5px 18px;font-size:13px;color:rgba(255,255,255,0.9);
  cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  gap:20px;white-space:nowrap;border-radius:4px;margin:1px 4px;
}
.mac-dd-item:hover{background:rgba(0,122,255,0.85);color:#fff;}
.mac-dd-item.disabled{opacity:0.35;pointer-events:none;}
.mac-dd-separator{height:1px;background:rgba(255,255,255,0.1);margin:4px 0;}
.mac-dd-shortcut{font-size:11px;opacity:0.55;}

<script>
// ============================================================
// BrowserOS - Core System
// Open Source - MIT License
// ============================================================

const OS = {
  version: '1.0.0',
  theme: 'windows',
  currentUser: null,
  db: null,
  userDb: null,
  windows: {},
  nextWinId: 1,
  activeWin: null,
  zIndex: 200,
};

// ============ IndexedDB Manager ============
const DB = {
  async openSystem() {
    return new Promise((res, rej) => {
      const req = indexedDB.open('BrowserOS_System', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('users'))
          db.createObjectStore('users', { keyPath: 'username' });
      };
      req.onsuccess = e => { OS.db = e.target.result; res(e.target.result); };
      req.onerror = e => rej(e);
    });
  },

  async openUser(username) {
    return new Promise((res, rej) => {
      const req = indexedDB.open(`BrowserOS_User_${username}`, 2);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('files'))
          db.createObjectStore('files', { keyPath: 'id' });
        if (!db.objectStoreNames.contains('settings'))
          db.createObjectStore('settings', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('music'))
          db.createObjectStore('music', { keyPath: 'id' });
      };
      req.onsuccess = e => { OS.userDb = e.target.result; res(e.target.result); };
      req.onerror = e => rej(e);
    });
  },

  async getAll(db, store) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).getAll();
      req.onsuccess = () => res(req.result);
      req.onerror = rej;
    });
  },

  async get(db, store, key) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(key);
      req.onsuccess = () => res(req.result);
      req.onerror = rej;
    });
  },

  async put(db, store, value) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).put(value);
      req.onsuccess = () => res(req.result);
      req.onerror = rej;
    });
  },

  async delete(db, store, key) {
    return new Promise((res, rej) => {
      const tx = db.transaction(store, 'readwrite');
      const req = tx.objectStore(store).delete(key);
      req.onsuccess = () => res();
      req.onerror = rej;
    });
  }
};

// ============ Auth ============
function hashPass(p) {
  let h = 0;
  for (let i = 0; i < p.length; i++) h = Math.imul(31, h) + p.charCodeAt(i) | 0;
  return h.toString(36);
}

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  document.getElementById('login-error').textContent = '';

  // Demo user
  if (user === 'guest' && pass === 'guest') {
    await ensureGuestUser();
  }

  const record = await DB.get(OS.db, 'users', user);
  if (!record || record.password !== hashPass(pass)) {
    document.getElementById('login-error').textContent = 'Invalid username or password';
    return;
  }
  await loginUser(record);
}

async function doSignup() {
  const user = document.getElementById('signup-user').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const pass2 = document.getElementById('signup-pass2').value;
  const err = document.getElementById('signup-error');

  if (!user || user.length < 2) { err.textContent = 'Username too short'; return; }
  if (pass.length < 3) { err.textContent = 'Password too short'; return; }
  if (pass !== pass2) { err.textContent = 'Passwords do not match'; return; }
  if (!/^[a-zA-Z0-9_]+$/.test(user)) { err.textContent = 'Letters, numbers, underscore only'; return; }

  const existing = await DB.get(OS.db, 'users', user);
  if (existing) { err.textContent = 'Username taken'; return; }

  const record = { username: user, password: hashPass(pass), created: Date.now(), theme: 'windows' };
  await DB.put(OS.db, 'users', record);
  await loginUser(record);
}

async function ensureGuestUser() {
  const g = await DB.get(OS.db, 'users', 'guest');
  if (!g) await DB.put(OS.db, 'users', { username: 'guest', password: hashPass('guest'), created: Date.now(), theme: 'windows' });
}

async function loginUser(record) {
  OS.currentUser = record;
  await DB.openUser(record.username);

  // Load user settings
  const themeSetting = await DB.get(OS.userDb, 'settings', 'theme');
  if (themeSetting) setTheme(themeSetting.value);
  else setTheme(record.theme || 'windows');

  document.getElementById('start-username').textContent = record.username;
  document.getElementById('login-screen').classList.add('hidden');
  await loadInstalledWebApps();
  startDesktop();
  notify('Welcome back!', `Signed in as ${record.username}`);
}

function doLogout() {
  // Save open windows
  closeAllWindows();
  OS.currentUser = null;
  OS.userDb = null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('start-menu').classList.remove('visible');
  loadExistingUsers();
}

async function loadExistingUsers() {
  const users = await DB.getAll(OS.db, 'users');
  const container = document.getElementById('existing-users');
  container.innerHTML = '';
  users.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'login-user-btn';
    btn.textContent = '👤 ' + u.username;
    btn.onclick = () => { document.getElementById('login-user').value = u.username; document.getElementById('login-pass').focus(); };
    container.appendChild(btn);
  });
}

function switchLoginTab(tab) {
  document.querySelectorAll('.login-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='signin')||(i===1&&tab==='signup')));
  document.getElementById('signin-form').style.display = tab === 'signin' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
}

// ============ Theme ============
function setTheme(theme) {
  OS.theme = theme;
  document.body.setAttribute('data-theme', theme);

  // Force display states explicitly (don't rely solely on CSS for reliability)
  const taskbar = document.getElementById('taskbar');
  const macMenu = document.getElementById('mac-menubar');
  if (theme === 'macos') {
    if (taskbar) taskbar.style.display = 'none';
    if (macMenu) macMenu.style.display = 'flex';
  } else {
    if (taskbar) { taskbar.style.removeProperty('display'); taskbar.style.display = 'flex'; }
    if (macMenu) macMenu.style.display = 'none';
  }

  // Start button content
  const startBtn = document.getElementById('start-btn');
  if (startBtn) {
    if (theme === 'linux') {
      startBtn.innerHTML = '🐧';
    } else {
      startBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20" style="display:block;"><rect x="0" y="0" width="9" height="9" rx="1" fill="#F25022"/><rect x="11" y="0" width="9" height="9" rx="1" fill="#7FBA00"/><rect x="0" y="11" width="9" height="9" rx="1" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" rx="1" fill="#FFB900"/></svg>`;
    }
    startBtn.style.cssText = '';
  }

  buildDock();
  buildWin11Taskbar();

  if (OS.userDb) DB.put(OS.userDb, 'settings', { key: 'theme', value: theme });
  if (OS.currentUser) {
    OS.currentUser.theme = theme;
    DB.put(OS.db, 'users', OS.currentUser);
  }
  document.querySelectorAll('.theme-card').forEach(c => c.classList.toggle('active', c.dataset.theme === theme));
}

// ============ Icons8 Fluency (Win11 Color) Icons ============
// Real Windows 11-style icons — icons8.com/icons/fluency
// Free for web with attribution. URL: https://img.icons8.com/fluent/96/{name}.png

// ── Windows 11 icons (Fluency style) ─────────────────────────
const I8_WIN  = 'https://img.icons8.com/fluent/96';
const I8_MAC  = 'https://img.icons8.com/ios-filled/96';
const I8_MACC = 'https://img.icons8.com/color/96'; // colour variants for macOS

// Win11 Fluency icon map
const ICON_MAP_WIN = {
  files:         'folder-invoices',

function iconImg(key, size = 32) {
  const theme = document.body?.getAttribute('data-theme') || 'windows';
  const cleanKey = String(key).replace('WIN11_ICONS.','').replace('WIN11_ICONS[','').replace(']','');

  if (theme === 'macos') {
    const mac = ICON_MAP_MAC[cleanKey];
    if (mac) {
      const fallbackWin = ICON_MAP_WIN[cleanKey] || 'file';
      const macStyle = size >= 40
        ? 'display:block;object-fit:contain;border-radius:' + Math.round(size * 0.22) + 'px;'
        : 'display:block;object-fit:contain;';
      return `<img src="${mac.base}/${mac.name}.png" width="${size}" height="${size}"
        style="${macStyle}"
        onerror="this.src='${I8_WIN}/${fallbackWin}.png'"
        loading="lazy" draggable="false"/>`;
    }
  }

  // Windows / Linux — Fluency icons
  const name = ICON_MAP_WIN[cleanKey] || 'file';
  return `<img src="${I8_WIN}/${name}.png" width="${size}" height="${size}"
    style="display:block;object-fit:contain;"
    onerror="this.src='${I8_WIN}/file.png'"
    loading="lazy" draggable="false"/>`;
}

// WIN11_ICONS shim — keeps all existing WIN11_ICONS[app.iconKey] calls working
const WIN11_ICONS = new Proxy({}, { get(_, k) { return k; } });

function getFileIconSvg(name, isFolder, size = 36) {
  let key;
  if (isFolder) {
    const n = name.toLowerCase();
    if (n==='documents'||n==='document') key='folder_docs';
    else if (n==='downloads'||n==='download') key='folder_dl';
    else if (n==='pictures'||n==='photos'||n==='images') key='folder_pics';
    else if (n==='music'||n==='audio') key='folder_music';
    else if (n==='videos'||n==='video') key='folder_video';
    else key='folder';
  } else {
    const ext = name.split('.').pop().toLowerCase();
    if (['mp3','wav','ogg','flac','aac','m4a'].includes(ext)) key='file_audio';
    else if (['jpg','jpeg','png','gif','webp','bmp','svg','ico'].includes(ext)) key='file_img';
    else if (['mp4','mov','avi','mkv','webm'].includes(ext)) key='file_video';
    else if (['js','ts','html','css','json','py','jsx','tsx','xml','java','cpp','c','cs','php','rb'].includes(ext)) key='file_code';
    else if (['zip','rar','7z','tar','gz','bz2'].includes(ext)) key='file_zip';
    else if (ext==='pdf') key='file_pdf';
    else key='file_txt';
  }
  return iconImg(key, size);
}

function installCustomWebApp() {
  const url = document.getElementById('webapp-url')?.value?.trim();
  const name = document.getElementById('webapp-name')?.value?.trim();
  if (!url || !url.startsWith('http')) { showNotification('Web Apps','Please enter a valid URL starting with https://'); return; }
  const appName = name || new URL(url).hostname.replace('www.','').split('.')[0];
  installWebApp(appName, url, '🌐', '#0078d4');
  closeModal();
  openInstallWebApp();
}

function installWebApp(name, url, icon, color) {
  const id = 'webapp_' + Date.now();
  const app = { id, name, url, icon, color, isWebApp:true, iconKey:'browser' };
  // Remove if already exists with same URL
  _installedWebApps = _installedWebApps.filter(a => a.url !== url);
  _installedWebApps.push(app);
  saveInstalledWebApps();
  // Add to APPS-like system for desktop + start menu
  rebuildInstalledApps();
  showNotification('Web Apps', `${name} installed! Find it on the desktop and dock.`);
  // Refresh dock + desktop
  buildDock();
  buildDesktopIcons();
  buildStartMenu();
  buildWin11Taskbar();
  return id;
}

function uninstallWebApp(id) {
  _installedWebApps = _installedWebApps.filter(a => a.id !== id);
  saveInstalledWebApps();
  rebuildInstalledApps();
  buildDock(); buildDesktopIcons(); buildStartMenu(); buildWin11Taskbar();
}

function rebuildInstalledApps() {
  // Web apps are opened via openApp which falls through to browser if not in APPS
  // We register them so openApp works
  _installedWebApps.forEach(app => {
    if (!app._registered) {
      app._registered = true;
      // Intercept openApp for this id
    }
  });
}

function buildDock() {

    el.setAttribute('data-label', app.name);

      el.classList.remove('bouncing');
      void el.offsetWidth; // force reflow
      el.classList.add('bouncing');
      setTimeout(() => el.classList.remove('bouncing'), 700);
      openApp(app.id);

    dock.appendChild(el);

  // Separator + Trash
  const sep = document.createElement('div');

// ============ Window Manager ============
function openApp(appId, opts = {}) {
  // Check if already open
  for (const [id, win] of Object.entries(OS.windows)) {
    if (win.appId === appId && !opts.forceNew) {
      focusWindow(id);
      if (win.minimized) restoreWindow(id);
      return id;
    }
  }

  // Check installed web apps too
  const app = APPS.find(a => a.id === appId) || _installedWebApps.find(a => a.id === appId);
  if (!app) return;

  const winId = 'win_' + OS.nextWinId++;
  const sizes = {
    files: [700, 480],
    music: [360, 520],
    browser: [800, 560],
    editor: [600, 450],
    terminal: [560, 380],
    settings: [640, 480],
    about: [400, 360],
  };
  const [w, h] = sizes[appId] || [600, 400];

  // Cascade position
  const offset = (OS.nextWinId * 22) % 160;
  const x = Math.min(offset + 40, window.innerWidth - w - 20);
  const y = Math.min(offset + 20, window.innerHeight - h - 80);

  const win = document.createElement('div');
  win.className = 'window';
  win.id = winId;
  win.style.cssText = `left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;

  const isMac = OS.theme === 'macos';
  win.innerHTML = `
    <div class="window-titlebar" id="tb_${winId}" style="${isMac ? 'flex-direction:row;' : ''}">
      ${isMac ? `
      <div class="window-controls">
        <button class="wc-btn close" onclick="closeWindow('${winId}')"></button>
        <button class="wc-btn minimize" onclick="minimizeWindow('${winId}')"></button>
        <button class="wc-btn maximize" onclick="toggleMaximize('${winId}')"></button>
      </div>
      <div class="window-title" style="flex:1;text-align:center;font-size:13px;font-weight:500;">${app.name}</div>
      <div style="width:54px;"></div>
      ` : `
      <div class="window-controls">
        <button class="wc-btn close" onclick="closeWindow('${winId}')">✕</button>
        <button class="wc-btn minimize" onclick="minimizeWindow('${winId}')">─</button>
        <button class="wc-btn maximize" onclick="toggleMaximize('${winId}')">□</button>
      </div>
      <div class="window-title" style="display:flex;align-items:center;gap:6px;">${iconImg(app.iconKey, 14)} ${app.name}</div>
      `}
    </div>
    <div class="window-body" id="body_${winId}"></div>
    <div class="window-resize" id="resize_${winId}"></div>
  `;

  document.getElementById('windows-container').appendChild(win);

  OS.windows[winId] = { appId, app, minimized: false, maximized: false };
  focusWindow(winId);

  // Load app content
  loadAppContent(winId, appId, opts);

  // Drag
  makeDraggable(winId);
  makeResizable(winId);

  // Taskbar button
  addTaskbarBtn(winId, app);

  // Dock indicator
  const dockItem = document.getElementById('dock-' + appId);
  if (dockItem) dockItem.classList.add('running');

  return winId;
}

function loadAppContent(winId, appId, opts) {
  const body = document.getElementById('body_' + winId);
  switch (appId) {
    case 'files': renderFileManager(body, winId); break;
    case 'music': renderMusicPlayer(body, winId); break;
    case 'browser': renderBrowser(body, winId, opts.url); break;
    case 'editor': renderEditor(body, winId, opts); break;
    case 'terminal': renderTerminal(body, winId); break;
    case 'settings': renderSettings(body, winId); break;
    case 'about': renderAbout(body, winId); break;
    default: {
      const webApp = _installedWebApps.find(a => a.id === appId);
      if (webApp) {
        body.style.cssText = 'padding:0;overflow:hidden;';
        body.innerHTML = `<iframe src="${webApp.url}" style="width:100%;height:100%;border:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"></iframe>`;
      } else {
        body.innerHTML = `<div class="empty-state">App not found</div>`;
      }
      break;
    }
  }
}

function focusWindow(winId) {
  OS.zIndex++;
  const win = document.getElementById(winId);
  if (!win) return;
  win.style.zIndex = OS.zIndex;
  win.classList.add('active');
  document.querySelectorAll('.window').forEach(w => { if (w.id !== winId) w.classList.remove('active'); });
  document.querySelectorAll('.taskbar-app-btn').forEach(b => b.classList.toggle('active', b.dataset.winId === winId));
  OS.activeWin = winId;

  const appId = OS.windows[winId]?.appId;
  const app = APPS.find(a => a.id === appId);
  if (app) document.getElementById('mac-active-app').textContent = app.name;
}

function closeWindow(winId) {
  const win = document.getElementById(winId);
  if (win) win.remove();
  const appId = OS.windows[winId]?.appId;
  delete OS.windows[winId];
  removeTaskbarBtn(winId);

  // Check if any other window of same app is open
  const stillOpen = Object.values(OS.windows).some(w => w.appId === appId);
  if (!stillOpen) {
    const dockItem = document.getElementById('dock-' + appId);
    if (dockItem) dockItem.classList.remove('running');
  }
}

function minimizeWindow(winId) {
  const win = document.getElementById(winId);
  if (!win) return;
  win.classList.add('minimized');
  OS.windows[winId].minimized = true;
  const btn = document.querySelector(`.taskbar-app-btn[data-win-id="${winId}"]`);
  if (btn) btn.classList.remove('active');
}

function restoreWindow(winId) {
  const win = document.getElementById(winId);
  if (!win) return;
  win.classList.remove('minimized');
  OS.windows[winId].minimized = false;
  focusWindow(winId);
}

function toggleMaximize(winId) {
  const win = document.getElementById(winId);
  if (!win) return;
  const state = OS.windows[winId];
  if (state.maximized) {
    win.classList.remove('maximized');
    if (state.prevRect) {
      win.style.left = state.prevRect.left;
      win.style.top = state.prevRect.top;
      win.style.width = state.prevRect.width;
      win.style.height = state.prevRect.height;
    }
    state.maximized = false;
  } else {
    state.prevRect = { left: win.style.left, top: win.style.top, width: win.style.width, height: win.style.height };
    win.classList.add('maximized');
    state.maximized = true;
  }
}

function closeAllWindows() {
  Object.keys(OS.windows).forEach(closeWindow);
}

// Taskbar buttons
function addTaskbarBtn(winId, app) {
  // Win11: mark pinned button as running
  const pinnedBtn = document.getElementById('tb-pinned-' + app.id);
  if (pinnedBtn) pinnedBtn.classList.add('running', 'active');

  // Linux/fallback taskbar
  const container = document.getElementById('taskbar-apps');
  const btn = document.createElement('button');
  btn.className = 'taskbar-app-btn active';
  btn.dataset.winId = winId;
  btn.innerHTML = `<span class="taskbar-app-btn-icon">${iconImg(WIN11_ICONS[app.iconKey], 16)}</span><span class="taskbar-app-btn-label">${app.name}</span>`;
  btn.addEventListener('click', () => {
    if (OS.windows[winId]?.minimized) restoreWindow(winId);
    else if (OS.activeWin === winId) minimizeWindow(winId);
    else focusWindow(winId);
  });
  container.appendChild(btn);
}

function removeTaskbarBtn(winId) {
  const btn = document.querySelector(`.taskbar-app-btn[data-win-id="${winId}"]`);
  if (btn) btn.remove();
  const appId = OS.windows[winId]?.appId;
  if (appId) {
    const stillOpen = Object.values(OS.windows).some(w => w.appId === appId);
    if (!stillOpen) {
      const pb = document.getElementById('tb-pinned-' + appId);
      if (pb) pb.classList.remove('running', 'active');
    }
  }
}

// Drag
function makeDraggable(winId) {
  const tb = document.getElementById('tb_' + winId);
  if (!tb) return;
  let drag = false, sx, sy, wx, wy;

  tb.addEventListener('mousedown', e => {
    if (e.target.classList.contains('wc-btn')) return;
    const win = document.getElementById(winId);
    if (OS.windows[winId]?.maximized) return;
    drag = true;
    sx = e.clientX; sy = e.clientY;
    wx = win.offsetLeft; wy = win.offsetTop;
    focusWindow(winId);
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const win = document.getElementById(winId);
    if (!win) { drag = false; return; }
    const nx = wx + (e.clientX - sx);
    const ny = Math.max(0, wy + (e.clientY - sy));
    win.style.left = nx + 'px';
    win.style.top = ny + 'px';
  });

  document.addEventListener('mouseup', () => { drag = false; });

  // Touch support
  tb.addEventListener('touchstart', e => {
    if (e.target.classList.contains('wc-btn')) return;
    const win = document.getElementById(winId);
    if (OS.windows[winId]?.maximized) return;
    drag = true;
    sx = e.touches[0].clientX; sy = e.touches[0].clientY;
    wx = win.offsetLeft; wy = win.offsetTop;
    focusWindow(winId);
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!drag) return;
    const win = document.getElementById(winId);
    if (!win) { drag = false; return; }
    win.style.left = (wx + e.touches[0].clientX - sx) + 'px';
    win.style.top = Math.max(0, wy + e.touches[0].clientY - sy) + 'px';
  }, { passive: true });

  document.addEventListener('touchend', () => { drag = false; });
}

function makeResizable(winId) {
  const handle = document.getElementById('resize_' + winId);
  if (!handle) return;
  let resizing = false, sx, sy, sw, sh;

  handle.addEventListener('mousedown', e => {
    const win = document.getElementById(winId);
    resizing = true;
    sx = e.clientX; sy = e.clientY;
    sw = win.offsetWidth; sh = win.offsetHeight;
    e.preventDefault(); e.stopPropagation();
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const win = document.getElementById(winId);
    if (!win) { resizing = false; return; }
    win.style.width = Math.max(300, sw + e.clientX - sx) + 'px';
    win.style.height = Math.max(200, sh + e.clientY - sy) + 'px';
  });

  document.addEventListener('mouseup', () => { resizing = false; });
}

async function fmRefresh(winId) {
  const content = document.getElementById('fm-content-' + winId);
  const status = document.getElementById('fm-status-' + winId);
  content.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

  const allFiles = await DB.getAll(OS.userDb, 'files');
  const items = allFiles.filter(f => {
    const parent = f.path.substring(0, f.path.lastIndexOf('/')) || '/';
    return parent === currentPath;
  });

  // Add default folders for root
  const folders = [];
  if (currentPath === '/') {
    ['Documents', 'Music', 'Pictures', 'Downloads'].forEach(name => {
      if (!items.find(i => i.name === name && i.type === 'folder')) {
        folders.push({ id: 'df_' + name, name, type: 'folder', path: '/' + name, size: 0 });
      }
    });
  }

  const allItems = [...folders, ...items];
  content.innerHTML = '';

  if (allItems.length === 0) {
    content.innerHTML = '<div class="empty-state" style="width:100%;text-align:center;padding:40px">📂 Empty folder<br><small>Upload files or create folders</small></div>';
  } else {
    allItems.forEach(item => {
      const el = document.createElement('div');
      el.className = 'fm-item';
      el.innerHTML = `<div class="fm-item-icon">${getFileIconSvg(item.name, item.type === 'folder')}</div><div class="fm-item-name">${item.name}</div>`;

      el.addEventListener('click', () => {
        document.querySelectorAll(`#fm-content-${winId} .fm-item`).forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
      });

      el.addEventListener('dblclick', () => {
        if (item.type === 'folder') {
          fmNavigate(winId, item.path);
        } else {
          fmOpenFile(item);
        }
      });

      el.addEventListener('contextmenu', e => {
        e.preventDefault();
        showContextMenu(e.clientX, e.clientY, [
          { label: '📂 Open', action: () => { if (item.type === 'folder') fmNavigate(winId, item.path); else fmOpenFile(item); } },
          { label: '✏️ Rename', action: () => fmRename(winId, item) },
          { sep: true },
          { label: '🗑️ Delete', action: () => fmDelete(winId, item) },
        ]);
      });

      content.appendChild(el);
    });
  }

  const fileCount = items.filter(i => i.type !== 'folder').length;
  status.textContent = `${allItems.length} items (${fileCount} files)`;
}

async function fmFileSelected(event, winId) {
  const files = Array.from(event.target.files);
  for (const file of files) {

  notify('Files Uploaded', `${files.length} file(s) added to ${currentPath}`);

async function fmDrop(event, winId) {
  event.preventDefault();
  const files = Array.from(event.dataTransfer.files);
  for (const file of files) await fmSaveFile(winId, file);
  await fmRefresh(winId);
  notify('Files Added', `${files.length} file(s) dropped`);
}

async function fmSaveFile(winId, file) {
  return new Promise(res => {
    const reader = new FileReader();
    reader.onload = async e => {
      const id = currentPath + '/' + file.name;
      await DB.put(OS.userDb, 'files', {
        id, name: file.name, path: id,
        type: file.type || 'file',
        size: file.size, data: e.target.result,
        modified: Date.now()
      });

      // Also save to music store if audio
      if (file.type.startsWith('audio/')) {
        await DB.put(OS.userDb, 'music', {
          id: id + '_music', name: file.name.replace(/\.[^.]+$/, ''),
          artist: 'Unknown', album: 'Unknown',
          src: e.target.result, size: file.size
        });
        MusicPlayer.refreshPlaylist();
      }
      res();
    };
    reader.readAsDataURL(file);
  });
}

    const id = currentPath + '/' + name;

async function fmDelete(winId, item) {
  if (item.id.startsWith('df_')) return; // Default folder
  await DB.delete(OS.userDb, 'files', item.id);
  await fmRefresh(winId);
  notify('Deleted', `${item.name} removed`);
}

async function fmRename(winId, item) {
  showInputModal('Rename', 'New name:', item.name, async (name) => {
    if (!name || name === item.name) return;
    const newId = currentPath + '/' + name;
    await DB.delete(OS.userDb, 'files', item.id);
    await DB.put(OS.userDb, 'files', { ...item, id: newId, name, path: newId });
    await fmRefresh(winId);
  });
}

function fmOpenFile(item) {
  const ext = item.name.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp','bmp','svg'].includes(ext)) {
    openApp('editor', { file: item, mode: 'image' });
  } else if (['mp3','wav','ogg','flac','aac','m4a'].includes(ext)) {
    openApp('music');
  } else {
    openApp('editor', { file: item });
  }
}

function fmBack(winId) {
  if (currentPath === '/') return;
  const parent = currentPath.substring(0, currentPath.lastIndexOf('/')) || '/';
  fmNavigate(winId, parent);
}

// ============ MUSIC PLAYER ============
const MusicPlayer = {
  tracks: [],
  currentIdx: -1,
  audio: null,
  playing: false,
  shuffle: false,
  repeat: false,

  init() {
    this.audio = new Audio();
    this.audio.addEventListener('timeupdate', () => this.updateProgress());
    this.audio.addEventListener('ended', () => this.next());
    this.audio.addEventListener('loadedmetadata', () => this.updateDuration());
  },

  async loadTracks() {
    const tracks = await DB.getAll(OS.userDb, 'music');
    this.tracks = tracks;
    this.renderPlaylist();
    this.updateVis();
  },

  async refreshPlaylist() {
    await this.loadTracks();
  },

  renderPlaylist() {
    const list = document.getElementById('music-playlist');
    if (!list) return;
    list.innerHTML = '';
    if (this.tracks.length === 0) {
      list.innerHTML = '<div class="empty-state">No music yet<br><small>Upload audio files via Files</small></div>';
      return;
    }
    this.tracks.forEach((track, i) => {
      const el = document.createElement('div');
      el.className = 'music-track' + (i === this.currentIdx ? ' playing' : '');
      el.innerHTML = `
        <div class="music-track-num">${i === this.currentIdx ? '▶' : i + 1}</div>
        <div class="music-track-info">
          <div class="music-track-name">${track.name}</div>
          <div style="opacity:0.5;font-size:11px">${track.artist || 'Unknown'}</div>
        </div>
        <div class="music-track-dur" id="dur-${i}">--:--</div>
      `;
      el.addEventListener('click', () => this.playTrack(i));
      list.appendChild(el);
    });
  },

  playTrack(idx) {
    if (!this.tracks[idx]) return;
    this.currentIdx = idx;
    const track = this.tracks[idx];
    this.audio.src = track.src;
    this.audio.play().catch(()=>{});
    this.playing = true;
    this.updateNowPlaying();
    this.renderPlaylist();
    this.updatePlayBtn();
    this.animateVis();
  },

  togglePlay() {
    if (!this.audio.src && this.tracks.length > 0) { this.playTrack(0); return; }
    if (this.playing) { this.audio.pause(); this.playing = false; this.stopVis(); }
    else { this.audio.play().catch(()=>{}); this.playing = true; this.animateVis(); }
    this.updatePlayBtn();
  },

  next() {
    if (this.tracks.length === 0) return;
    let idx = this.shuffle
      ? Math.floor(Math.random() * this.tracks.length)
      : (this.currentIdx + 1) % this.tracks.length;
    this.playTrack(idx);
  },

  prev() {
    if (this.tracks.length === 0) return;
    let idx = (this.currentIdx - 1 + this.tracks.length) % this.tracks.length;
    this.playTrack(idx);
  },

  updateProgress() {
    const prog = document.getElementById('music-progress');
    const curr = document.getElementById('music-curr');
    if (!prog || !this.audio.duration) return;
    prog.value = (this.audio.currentTime / this.audio.duration) * 100 || 0;
    if (curr) curr.textContent = formatTime(this.audio.currentTime);
  },

  updateDuration() {
    const dur = document.getElementById('music-dur');
    if (dur) dur.textContent = formatTime(this.audio.duration);
  },

  updateNowPlaying() {
    const track = this.tracks[this.currentIdx];
    if (!track) return;
    const title = document.getElementById('music-title');
    const artist = document.getElementById('music-artist');
    if (title) title.textContent = track.name;
    if (artist) artist.textContent = track.artist || 'Unknown Artist';
  },

  updatePlayBtn() {
    const btn = document.getElementById('music-play-btn');
    if (btn) btn.textContent = this.playing ? '⏸' : '▶';
  },

  seek(val) {
    if (this.audio.duration) this.audio.currentTime = (val / 100) * this.audio.duration;
  },

  setVolume(val) {
    this.audio.volume = val / 100;
  },

  visInterval: null,
  animateVis() {
    if (this.visInterval) return;
    this.visInterval = setInterval(() => {
      const bars = document.querySelectorAll('.vis-bar');
      bars.forEach(bar => {
        const h = this.playing ? (Math.random() * 60 + 5) : 5;
        bar.style.height = h + 'px';
      });
    }, 120);
  },
  stopVis() {
    clearInterval(this.visInterval);
    this.visInterval = null;
    document.querySelectorAll('.vis-bar').forEach(b => b.style.height = '4px');
  },
  updateVis() {
    if (this.playing) this.animateVis(); else this.stopVis();
  }
};

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function browserNewTab(winId, url) {
  const tabId = 'btab_' + Date.now();
  browserTabs[winId] = browserTabs[winId] || {};
  browserTabs[winId][tabId] = { url: url || null, title: 'New Tab' };

  // Create tab button
  const tabsEl = document.getElementById('btabs-' + winId);
  const newTabBtn = tabsEl.querySelector('.browser-new-tab');

  const tabEl = document.createElement('div');
  tabEl.className = 'browser-tab active';
  tabEl.dataset.tabId = tabId;
  tabEl.innerHTML = `
    <span class="browser-tab-title" id="btitle-${tabId}">New Tab</span>
    <button class="browser-tab-close" onclick="browserCloseTab('${winId}','${tabId}',event)">×</button>
  `;
  tabEl.addEventListener('click', () => browserSwitchTab(winId, tabId));
  tabsEl.insertBefore(tabEl, newTabBtn);

  // Create content
  const content = document.getElementById('bcontent-' + winId);
  const frame = document.createElement('iframe');
  frame.id = 'bframe-' + tabId;
  frame.className = 'browser-frame';
  frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation');

  const newTabPage = document.createElement('div');
  newTabPage.id = 'bnewtab-' + tabId;
  newTabPage.className = 'browser-newtab';
  newTabPage.innerHTML = `
    <h2>New Tab</h2>
    <input style="width:280px;padding:10px 16px;background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:14px;outline:none;" 
      placeholder="Search or enter URL..." onkeydown="if(event.key==='Enter')browserNavigate('${winId}',this.value,'${tabId}')">
    <div class="browser-quicklinks">
      ${QUICK_LINKS.map(ql => `
        <div class="browser-ql" onclick="browserNavigate('${winId}','${ql.url}','${tabId}')">
          <span class="browser-ql-icon">${ql.icon}</span>
          <span>${ql.label}</span>
        </div>
      `).join('')}
    </div>
  `;

  content.appendChild(frame);
  content.appendChild(newTabPage);

  browserSwitchTab(winId, tabId);

  if (url) browserNavigate(winId, url, tabId);
}

function browserSwitchTab(winId, tabId) {
  activeBrowserTab = tabId;

  document.querySelectorAll(`#btabs-${winId} .browser-tab`).forEach(t => t.classList.toggle('active', t.dataset.tabId === tabId));

  const content = document.getElementById('bcontent-' + winId);
  if (!content) return;

  content.querySelectorAll('.browser-frame').forEach(f => f.classList.remove('active'));
  content.querySelectorAll('.browser-newtab').forEach(f => f.classList.remove('active'));

  const frame = document.getElementById('bframe-' + tabId);
  const newtab = document.getElementById('bnewtab-' + tabId);

  const tab = browserTabs[winId]?.[tabId];
  if (tab?.url) {
    if (frame) frame.classList.add('active');
    document.getElementById('burl-' + winId).value = tab.url;
  } else {
    if (newtab) newtab.classList.add('active');
    document.getElementById('burl-' + winId).value = '';
  }
}

function browserNavigate(winId, url, tabId) {
  tabId = tabId || activeBrowserTab;
  if (!tabId) return;

  let fullUrl = url.trim();
  if (!fullUrl.startsWith('http://') && !fullUrl.startsWith('https://')) {
    if (fullUrl.includes('.') && !fullUrl.includes(' ')) fullUrl = 'https://' + fullUrl;
    else fullUrl = 'https://www.google.com/search?q=' + encodeURIComponent(fullUrl);
  }

  const frame = document.getElementById('bframe-' + tabId);
  const newtab = document.getElementById('bnewtab-' + tabId);

  if (frame) { frame.src = fullUrl; frame.classList.add('active'); }
  if (newtab) newtab.classList.remove('active');
  document.getElementById('burl-' + winId).value = fullUrl;

  if (browserTabs[winId]) browserTabs[winId][tabId] = { ...browserTabs[winId][tabId], url: fullUrl };

  const titleEl = document.getElementById('btitle-' + tabId);
  if (titleEl) {
    try { titleEl.textContent = new URL(fullUrl).hostname; } catch { titleEl.textContent = 'Page'; }
  }
}

function browserCloseTab(winId, tabId, event) {
  event.stopPropagation();
  const tabEl = document.querySelector(`[data-tab-id="${tabId}"]`);
  const frame = document.getElementById('bframe-' + tabId);
  const newtab = document.getElementById('bnewtab-' + tabId);
  if (tabEl) tabEl.remove();
  if (frame) frame.remove();
  if (newtab) newtab.remove();
  if (browserTabs[winId]) delete browserTabs[winId][tabId];

  // If was active, switch to first available
  if (activeBrowserTab === tabId) {
    const remaining = Object.keys(browserTabs[winId] || {});
    if (remaining.length > 0) browserSwitchTab(winId, remaining[0]);
    else browserNewTab(winId);
  }
}

function browserBack(winId) {
  const frame = document.querySelector(`#bcontent-${winId} .browser-frame.active`);
  if (frame) try { frame.contentWindow.history.back(); } catch(e){}
}
function browserForward(winId) {
  const frame = document.querySelector(`#bcontent-${winId} .browser-frame.active`);
  if (frame) try { frame.contentWindow.history.forward(); } catch(e){}
}
function browserReload(winId) {
  const frame = document.querySelector(`#bcontent-${winId} .browser-frame.active`);
  if (frame) frame.src = frame.src;
}
