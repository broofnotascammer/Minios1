function termPrint(winId, text, cls = '') {
  const out = document.getElementById('term-out-' + winId);
  if (!out) return;
  const line = document.createElement('div');
  line.className = 'terminal-line ' + cls;
  line.textContent = text;
  out.appendChild(line);
  out.scrollTop = out.scrollHeight;
}

function termRun(winId, cmd) {
  termPrint(winId, `$ ${cmd}`, 'cmd');
  const [command, ...args] = cmd.trim().split(/\s+/);

  const COMMANDS = {
    help: () => {
      ['clear          - Clear terminal',
       'echo [text]    - Print text',
       'date           - Show date/time',
       'whoami         - Current user',
       'ls [path]      - List files (real path needs connector)',
       'pwd            - Current directory',
       'mkdir [name]   - Make directory',
       'theme          - Desktop theme',
       'version        - OS version',
       'calc [expr]    - Calculator',
       'uname          - System info',
       'history        - Command history',
       '\u2500\u2500\u2500 Connector \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500',
       'conn             - Connection status & caps',
       'conn ls [path]   - List real directory',
       'conn read [path] - Read real file',
       'conn sysinfo     - Hardware info',
       'conn cpu         - CPU usage',
       'conn mem         - Memory usage',
       'conn notify [msg]- Native OS notification',
      ].forEach(l => termPrint(winId, l));
    },
    clear: () => { const out = document.getElementById('term-out-' + winId); if (out) out.innerHTML = ''; },
    echo: () => termPrint(winId, args.join(' ')),
    date: () => termPrint(winId, new Date().toString()),
    whoami: () => termPrint(winId, OS.currentUser?.username || 'guest'),
    pwd: () => termPrint(winId, currentPath),
    ls: async () => {
      if (Connector.connected && Connector.capabilities.fs && args[0]) {
        try {
          const entries = await Connector.fs.readDir(args[0]);
          termPrint(winId, '\u{1F4C2} ' + args[0] + ':', 'success');
          entries.forEach(e => termPrint(winId, '  ' + (e.isDir?'\u{1F4C1}':'\u{1F4C4}') + ' ' + e.name + (e.size?' ('+Math.round(e.size/1024)+'KB)':'')));
          return;
        } catch(err) { termPrint(winId, 'FS error: ' + err.message, 'error'); return; }
      }
      const files = await DB.getAll(OS.userDb, 'files');
      const inDir = files.filter(f => (f.path.substring(0, f.path.lastIndexOf('/')) || '/') === currentPath);
      if (inDir.length === 0) termPrint(winId, '(empty)');
      else inDir.forEach(f => termPrint(winId, (f.type === 'folder' ? '\u{1F4C1} ' : '\u{1F4C4} ') + f.name));
    },
    mkdir: async () => {
      const name = args[0];
      if (!name) { termPrint(winId, 'Usage: mkdir <name>', 'error'); return; }
      const id = currentPath + '/' + name;
      await DB.put(OS.userDb, 'files', { id, name, path: id, type: 'folder', size: 0, modified: Date.now() });
      termPrint(winId, "Directory '" + name + "' created", 'success');
    },
    theme: () => {
      const t = args[0];
      if (t === 'windows') { setTheme(t); termPrint(winId, 'Theme set to ' + t, 'success'); }
      else termPrint(winId, 'Usage: theme windows', 'error');
    },
    version: () => termPrint(winId, 'BrowserOS v' + OS.version + ' | Connector: ' + (Connector.connected ? 'online' : 'offline')),
    uname: () => termPrint(winId, 'BrowserOS ' + OS.version + ' ' + navigator.platform + ' ' + navigator.userAgent.split(' ').slice(-1)[0]),
    calc: () => {
      try { termPrint(winId, String(eval(args.join(' '))), 'success'); }
      catch { termPrint(winId, 'Invalid expression', 'error'); }
    },
    history: () => termHistory[winId].forEach((h, i) => termPrint(winId, '  ' + (i + 1) + '  ' + h)),
    open: () => { const a = APPS.find(x => x.id === args[0]); if (a) { openApp(a.id); termPrint(winId, 'Opening ' + a.name, 'success'); } else termPrint(winId, 'Unknown app', 'error'); },
    exit: () => { for (const [id, w] of Object.entries(OS.windows)) { if (w.appId === 'terminal') { closeWindow(id); break; } } },
    conn: async () => {
      const sub = args[0];
      if (!sub) {
        if (!Connector.connected) {
          termPrint(winId, '\u25CF Connector offline', 'error');
          termPrint(winId, '  Start: node browseros-connector.js');
          return;
        }
        termPrint(winId, '\u25CF Connector online  \u2014 ws://localhost:' + Connector.PORT, 'success');
        termPrint(winId, '  FS:' + (Connector.capabilities.fs?'\u2713':'\u2717') + '  HW:' + (Connector.capabilities.hw?'\u2713':'\u2717') + '  BG:' + (Connector.capabilities.bg?'\u2713':'\u2717') + '  GPU:' + (Connector.capabilities.gpu?'\u2713':'\u2717'));
        return;
      }
      if (!Connector.connected) { termPrint(winId, 'Connector offline \u2014 run: node browseros-connector.js', 'error'); return; }
      try {
        if (sub === 'ls') {
          const path = args[1] || (await Connector.fs.getHomeDir());
          const entries = await Connector.fs.readDir(path);
          termPrint(winId, '\u{1F4C2} ' + path, 'success');
          entries.forEach(e => termPrint(winId, '  ' + (e.isDir?'\u{1F4C1}':'\u{1F4C4}') + ' ' + e.name + (e.size?' ('+Math.round(e.size/1024)+'KB)':'')));
        } else if (sub === 'read') {
          const path = args[1]; if (!path) { termPrint(winId, 'Usage: conn read <path>', 'error'); return; }
          const content2 = await Connector.fs.readFile(path);
          termPrint(winId, content2);
        } else if (sub === 'sysinfo') {
          const info = await Connector.hw.getSystemInfo();
          Object.entries(info).forEach(([k,v]) => termPrint(winId, '  ' + k + ': ' + v));
        } else if (sub === 'cpu') {
          const cpu = await Connector.hw.getCpuUsage();
          termPrint(winId, 'CPU: ' + JSON.stringify(cpu), 'success');
        } else if (sub === 'mem') {
          const mem = await Connector.hw.getMemUsage();
          termPrint(winId, 'Memory: ' + JSON.stringify(mem), 'success');
        } else if (sub === 'notify') {
          const msg = args.slice(1).join(' ') || 'Hello from BrowserOS!';
          await Connector.bg.sendSystemNotification('BrowserOS', msg);
          termPrint(winId, 'System notification sent', 'success');
        } else {
          termPrint(winId, "Unknown: conn " + sub + " \u2014 try 'help'", 'error');
        }
      } catch(err) { termPrint(winId, 'Connector error: ' + err.message, 'error'); }
    },
  };

  const handler = COMMANDS[command];
  if (handler) handler();
  else if (command) termPrint(winId, `Command not found: ${command}. Try 'help'`, 'error');
}

// ============ NOTIFICATIONS ============
function notify(title, body, duration = 4000) {
  const center = document.getElementById('notification-center');
  const el = document.createElement('div');
  el.className = 'notification';
  el.innerHTML = `
    <div class="notif-header">🔔 ${title}</div>
    <div class="notif-body">${body}</div>
  `;
  center.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.5s, transform 0.5s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(120%)';
    setTimeout(() => el.remove(), 500);
  }, duration);
  el.addEventListener('click', () => el.remove());
}

// ============ MODALS ============
function showInputModal(title, label, defaultVal, callback) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `
    <label style="font-size:13px;opacity:0.7">${label}</label>
    <input class="modal-input" id="modal-input-val" value="${defaultVal || ''}" style="margin-top:8px">
  `;
  document.getElementById('modal-btns').innerHTML = `
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" onclick="confirmInput(${JSON.stringify(callback.toString())})">OK</button>
  `;
  overlay.classList.add('visible');
  overlay._callback = callback;
  setTimeout(() => document.getElementById('modal-input-val')?.select(), 50);
  document.getElementById('modal-input-val').addEventListener('keydown', e => {
    if (e.key === 'Enter') { overlay._callback(document.getElementById('modal-input-val').value); closeModal(); }
  });
}

function showConfirmModal(title, msg, callback) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = `<p style="font-size:13px;opacity:0.7">${msg}</p>`;
  document.getElementById('modal-btns').innerHTML = `
    <button class="modal-btn secondary" onclick="closeModal()">Cancel</button>
    <button class="modal-btn primary" style="background:#e74c3c" onclick="closeModal();${callback}">Confirm</button>
  `;
  overlay._callback = callback;
  overlay.classList.add('visible');
  document.querySelector('#modal-btns .primary').onclick = () => { callback(); closeModal(); };
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('visible');
}

function confirmInput() {
  const val = document.getElementById('modal-input-val').value;
  const overlay = document.getElementById('modal-overlay');
  if (overlay._callback) overlay._callback(val);
  closeModal();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ============ CONTEXT MENU ============
function showContextMenu(x, y, items) {
  const menu = document.getElementById('context-menu');
  menu.innerHTML = '';
  items.forEach(item => {
    if (item.sep) { const sep = document.createElement('div'); sep.className = 'ctx-sep'; menu.appendChild(sep); return; }
    const el = document.createElement('div');
    el.className = 'ctx-item';
    el.textContent = item.label;
    el.addEventListener('click', () => { item.action(); menu.classList.remove('visible'); });
    menu.appendChild(el);
  });

  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - menu.offsetHeight - 10) + 'px';
  menu.classList.add('visible');
}

document.addEventListener('click', () => {

// ============ SERVICE WORKER ============
const SW_SCRIPT = `
const CACHE = 'browseros-v1';
const ASSETS = ['/'];
self.addEventListener('install', e => { e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))); });
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('Offline'))));
});
`;

if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_SCRIPT], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ============ KEYBOARD SHORTCUTS ============
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Escape') toggleStartMenu();
  if (e.altKey && e.key === 'F4') {
    if (OS.activeWin) closeWindow(OS.activeWin);
  }
  if (e.key === 'Escape') {
    document.getElementById('start-menu').classList.remove('visible');
    document.getElementById('context-menu').classList.remove('visible');
  }
});

// Login enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) {
    const signupVisible = document.getElementById('signup-form').style.display !== 'none';
    if (signupVisible) doSignup(); else doLogin();
  }
});

// ── UPDATED CLOCK ──
function startClock() {
  const update = () => {
    const now = new Date();
    const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString([], { month: 'numeric', day: 'numeric', year: 'numeric' });
    const dateLong = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
    const secs = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    const w11c = document.getElementById('win11-clock');
    if (w11c) w11c.innerHTML = `<div>${time}</div><div style="font-size:10px;opacity:0.7">${date}</div>`;

    const cl = document.getElementById('taskbar-clock');
    if (cl) cl.innerHTML = `<span>${secs}</span><span style="font-size:10px;opacity:0.7">${date}</span>`;


    const lc = document.getElementById('login-clock');
    const ld = document.getElementById('login-date-str');
    if (lc) lc.textContent = time;
    if (ld) ld.textContent = dateLong;
  };
  update();
  setInterval(update, 1000);
}

// ── WIN11 PINNED TASKBAR ──
function buildWin11Taskbar() {
  const pinned = document.getElementById('taskbar-pinned');
  if (!pinned) return;
  pinned.innerHTML = '';
  APPS.forEach(app => {
    const btn = document.createElement('div');
    btn.className = 'taskbar-pinned-btn';
    btn.id = 'tb-pinned-' + app.id;
    btn.title = app.name;
    btn.innerHTML = iconImg(WIN11_ICONS[app.iconKey], 24);
    btn.addEventListener('click', () => {
      const existing = Object.entries(OS.windows).find(([,w]) => w.appId === app.id);
      if (existing) {
        const [wid, wstate] = existing;
        if (wstate.minimized) restoreWindow(wid);
        else if (OS.activeWin === wid) minimizeWindow(wid);
        else focusWindow(wid);
      } else {
        openApp(app.id);
      }
    });
    pinned.appendChild(btn);
  });
}
